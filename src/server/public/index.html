<!doctype html>
<html>
    <head>
        <title>Zalo Agent Proxy</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                background: #f4f4f9;
                margin: 0;
                padding: 20px;
            }
            .container {
                max-width: 800px;
                margin: auto;
                background: white;
                padding: 20px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }
            h1 {
                color: #333;
            }
            .btn {
                background: #0068ff;
                color: white;
                border: none;
                padding: 10px 15px;
                border-radius: 4px;
                cursor: pointer;
            }
            .btn:hover {
                background: #0050c7;
            }
            .btn-danger {
                background: #ff4d4f;
            }
            .btn-danger:hover {
                background: #cf1322;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 20px;
            }
            th,
            td {
                border: 1px solid #ddd;
                padding: 12px;
                text-align: left;
            }
            th {
                background: #f8f9fa;
            }
            .status-dot {
                height: 10px;
                width: 10px;
                background-color: #bbb;
                border-radius: 50%;
                display: inline-block;
                margin-right: 5px;
            }
            .connected {
                background-color: #4caf50;
            }
            .modal {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.5);
                align-items: center;
                justify-content: center;
            }
            .modal-content {
                background: white;
                padding: 30px;
                border-radius: 8px;
                text-align: center;
            }
            #qrImage {
                display: none;
                margin: 20px auto;
                max-width: 250px;
            }
            .hidden {
                display: none;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Zalo Agent Proxy - Accounts</h1>
            <button class="btn" onclick="openQrModal()">+ Add Account</button>

            <table>
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>Name</th>
                        <th>Account ID</th>
                        <th>Proxy</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="accountTable">
                    <tr>
                        <td colspan="5">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="modal" id="qrModal">
            <div class="modal-content">
                <h2>QR Code Login</h2>
                <div id="qrLoading">Generating QR Code...</div>
                <img id="qrImage" src="" alt="QR Code" />
                <div id="qrStatus">Please scan with Zalo App</div>
                <br />
                <button class="btn btn-danger" onclick="closeQrModal()">Cancel</button>
            </div>
        </div>

        <script>
            let pollInterval = null;

            async function loadAccounts() {
                try {
                    const res = await fetch("/api/accounts");
                    const accounts = await res.json();
                    const tbody = document.getElementById("accountTable");
                    tbody.innerHTML = "";

                    if (accounts.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5">No accounts found.</td></tr>';
                        return;
                    }

                    accounts.forEach((acc) => {
                        const tr = document.createElement("tr");
                        tr.innerHTML = `
                    <td><span class="status-dot ${acc.connected ? "connected" : ""}"></span> ${acc.connected ? "Online" : "Offline"}</td>
                    <td>${acc.name || "N/A"}</td>
                    <td>${acc.ownId}</td>
                    <td>${acc.proxy}</td>
                    <td><button class="btn btn-danger" onclick="removeAccount('${acc.ownId}')">Remove</button></td>
                `;
                        tbody.appendChild(tr);
                    });
                } catch (e) {
                    console.error("Failed to load accounts", e);
                }
            }

            async function removeAccount(id) {
                if (!confirm("Are you sure you want to remove this account?")) return;
                await fetch(`/api/accounts/${id}`, { method: "DELETE" });
                loadAccounts();
            }

            async function openQrModal() {
                const modal = document.getElementById("qrModal");
                const img = document.getElementById("qrImage");
                const loading = document.getElementById("qrLoading");
                const status = document.getElementById("qrStatus");

                modal.style.display = "flex";
                img.style.display = "none";
                loading.style.display = "block";
                status.innerText = "Please scan with Zalo App";

                try {
                    const res = await fetch("/api/login/qr", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({}),
                    });
                    const { sessionId } = await res.json();

                    pollInterval = setInterval(async () => {
                        const pollRes = await fetch(`/api/login/qr/${sessionId}`);
                        const data = await pollRes.json();

                        if (data.qrData) {
                            loading.style.display = "none";
                            img.style.display = "block";
                            // The qrData from zca-js is a Buffer/base64, let's assume it's just base64 string
                            // Wait, we need to handle format correctly. We'll fix it if it's raw buffer.
                            // Usually we might need to convert buffer to base64 on server side.
                            img.src = `data:image/png;base64,${data.qrData}`;
                        }

                        if (data.status === "success") {
                            status.innerText = `Logged in as ${data.displayName || data.ownId}!`;
                            clearInterval(pollInterval);
                            setTimeout(() => {
                                closeQrModal();
                                loadAccounts();
                            }, 2000);
                        } else if (data.status === "error") {
                            status.innerText = `Error: ${data.error}`;
                            clearInterval(pollInterval);
                        }
                    }, 2000);
                } catch (e) {
                    console.error(e);
                    loading.innerText = "Failed to start login.";
                }
            }

            function closeQrModal() {
                document.getElementById("qrModal").style.display = "none";
                if (pollInterval) clearInterval(pollInterval);
            }

            window.onload = loadAccounts;
        </script>
    </body>
</html>
